name: Docker Publish Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/edwardchamberlain/grove-control
  DOCKERHUB_IMAGE: docker.io/edchamberlain/grove-control

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-dev:
    name: Publish :dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check version metadata
        run: python scripts/check_version.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :dev
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:dev
            ${{ env.DOCKERHUB_IMAGE }}:dev
          labels: |
            org.opencontainers.image.source=https://github.com/EdwardChamberlain/grove-control
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=dev
          cache-from: type=gha,scope=docker-publish-dev
          cache-to: type=gha,scope=docker-publish-dev,mode=max
