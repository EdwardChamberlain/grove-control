name: Docker Publish Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [dev]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/edwardchamberlain/grove-control

concurrency:
  group: docker-publish-dev-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-dev:
    name: Publish :dev
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'dev')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :dev
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.GHCR_IMAGE }}:dev
          labels: |
            org.opencontainers.image.source=https://github.com/EdwardChamberlain/grove-control
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
            org.opencontainers.image.version=dev
          cache-from: type=gha,scope=docker-publish-dev
          cache-to: type=gha,scope=docker-publish-dev,mode=max
